<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="350" viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071a2f"/>
      <stop offset="100%" stop-color="#0b2a4a"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fd1ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4fd1ff" />
    </marker>
  </defs>

  <rect width="800" height="350" fill="url(#bg)" />

  <text x="400" y="50" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="26"
        fill="#ffffff"
        font-weight="600">
    Zabbix Alert Engineering Model
  </text>

  <!-- Flow Steps -->
  <rect x="50" y="150" width="120" height="60" rx="12"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
  <text x="110" y="175" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="12"
        fill="#bde9ff">
    Trigger
  </text>
  <text x="110" y="190" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="11"
        fill="#bde9ff">
    (Agent Down / High CPU)
  </text>

  <line x1="170" y1="180" x2="200" y2="180"
        stroke="#4fd1ff" stroke-width="2"
        marker-end="url(#arrow)" />

  <rect x="200" y="150" width="120" height="60" rx="12"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
  <text x="260" y="185" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="12"
        fill="#bde9ff">
    Problem Created
  </text>

  <line x1="320" y1="180" x2="350" y2="180"
        stroke="#4fd1ff" stroke-width="2"
        marker-end="url(#arrow)" />

  <rect x="350" y="150" width="120" height="60" rx="12"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
  <text x="410" y="175" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="12"
        fill="#bde9ff">
    Notification
  </text>
  <text x="410" y="190" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="11"
        fill="#bde9ff">
    (Email / Escalation)
  </text>

  <line x1="470" y1="180" x2="500" y2="180"
        stroke="#4fd1ff" stroke-width="2"
        marker-end="url(#arrow)" />

  <rect x="500" y="150" width="120" height="60" rx="12"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
  <text x="560" y="185" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="12"
        fill="#bde9ff">
    Recovery Detected
  </text>

  <line x1="620" y1="180" x2="650" y2="180"
        stroke="#4fd1ff" stroke-width="2"
        marker-end="url(#arrow)" />

  <rect x="650" y="150" width="120" height="60" rx="12"
        fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
  <text x="710" y="175" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="11"
        fill="#bde9ff">
    Downtime Calculation
  </text>
  <text x="710" y="190" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="11"
        fill="#bde9ff">
    & RCA
  </text>

</svg>
