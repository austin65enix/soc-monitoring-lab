<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">

<rect width="1200" height="680" fill="#0B1220"></rect>

<text x="600" y="60" text-anchor="middle" fill="#E5E7EB" font-size="32" font-family="Arial" font-weight="700">
SOC Operational Capability Model
</text>

<text x="600" y="95" text-anchor="middle" fill="#94A3B8" font-size="15" font-family="Arial">
Continuous monitoring and operational improvement cycle
</text>

<!-- circle layout -->

<!-- Monitoring -->

<rect x="480" y="160" width="240" height="90" rx="16" fill="#172033" stroke="#3B82F6" stroke-width="2"></rect>
<text x="600" y="210" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Arial" font-weight="600">
Monitoring
</text>

<!-- Alerting -->

<rect x="820" y="300" width="240" height="90" rx="16" fill="#172033" stroke="#22C55E" stroke-width="2"></rect>
<text x="940" y="350" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Arial" font-weight="600">
Alerting
</text>

<!-- Investigation -->

<rect x="680" y="470" width="240" height="90" rx="16" fill="#172033" stroke="#EAB308" stroke-width="2"></rect>
<text x="800" y="520" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Arial" font-weight="600">
Investigation
</text>

<!-- Root Cause -->

<rect x="280" y="470" width="240" height="90" rx="16" fill="#172033" stroke="#F97316" stroke-width="2"></rect>
<text x="400" y="520" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Arial" font-weight="600">
Root Cause Analysis
</text>

<!-- Optimization -->

<rect x="140" y="300" width="240" height="90" rx="16" fill="#172033" stroke="#EF4444" stroke-width="2"></rect>
<text x="260" y="350" text-anchor="middle" fill="#E5E7EB" font-size="18" font-family="Arial" font-weight="600">
Optimization
</text>

<!-- arrows -->

<line x1="720" y1="205" x2="820" y2="300" stroke="#64748B" stroke-width="4"></line>
<line x1="940" y1="390" x2="840" y2="470" stroke="#64748B" stroke-width="4"></line>
<line x1="680" y1="520" x2="520" y2="520" stroke="#64748B" stroke-width="4"></line>
<line x1="280" y1="520" x2="200" y2="390" stroke="#64748B" stroke-width="4"></line>
<line x1="260" y1="300" x2="480" y2="200" stroke="#64748B" stroke-width="4"></line>

<text x="600" y="640" text-anchor="middle" fill="#94A3B8" font-size="16" font-family="Arial">
A mature SOC continuously improves detection quality, investigation efficiency, and operational sustainability.
</text>

</svg>