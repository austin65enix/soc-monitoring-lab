<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071a2f"/>
      <stop offset="100%" stop-color="#0b2a4a"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fd1ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <text x="400" y="60" text-anchor="middle"
        font-family="Segoe UI, Arial"
        font-size="30"
        fill="#ffffff"
        font-weight="600">
    SOC 五層架構總覽
  </text>

  <!-- Layer Boxes -->

    <rect x="100" y="110" width="600" height="60" rx="15"
          fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
    <text x="400" y="148" text-anchor="middle"
          font-family="Segoe UI, Arial"
          font-size="18"
          fill="#bde9ff">
      1. Detection Layer – Zabbix / Wazuh / Zeek
    </text>
    
    <rect x="100" y="185" width="600" height="60" rx="15"
          fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
    <text x="400" y="223" text-anchor="middle"
          font-family="Segoe UI, Arial"
          font-size="18"
          fill="#bde9ff">
      2. Correlation Layer – Graylog
    </text>
    
    <rect x="100" y="260" width="600" height="60" rx="15"
          fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
    <text x="400" y="298" text-anchor="middle"
          font-family="Segoe UI, Arial"
          font-size="18"
          fill="#bde9ff">
      3. Root Cause Analysis Layer
    </text>
    
    <rect x="100" y="335" width="600" height="60" rx="15"
          fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
    <text x="400" y="373" text-anchor="middle"
          font-family="Segoe UI, Arial"
          font-size="18"
          fill="#bde9ff">
      4. Trend Validation Layer – Prometheus
    </text>
    
    <rect x="100" y="410" width="600" height="60" rx="15"
          fill="none" stroke="url(#strokeGrad)" stroke-width="2"/>
    <text x="400" y="448" text-anchor="middle"
          font-family="Segoe UI, Arial"
          font-size="18"
          fill="#bde9ff">
      5. Operational Sustainability – Maintenance SOP
    </text>
    
</svg>