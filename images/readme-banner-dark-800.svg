<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#071a2f"/>
      <stop offset="100%" stop-color="#0b2a4a"/>
    </linearGradient>
    
    <linearGradient id="neonStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fd1ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="url(#bgGradient)" />

  <!-- Title -->
  <text x="60" y="95"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="36"
        fill="#ffffff"
        font-weight="600">
    SOC Monitoring Lab
  </text>

  <!-- Subtitle -->
  <text x="60" y="125"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="16"
        fill="#9ecfff">
    Integrated Monitoring × SIEM × Architecture Lab
  </text>

  <!-- Neon Capsule 1 -->
  <rect x="60" y="155" rx="20" ry="20"
        width="340" height="36"
        fill="none"
        stroke="url(#neonStroke)"
        stroke-width="2"
        filter="url(#glow)" />

  <text x="80" y="178"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="13"
        fill="#bde9ff">
    Zabbix • Wazuh • Zeek • Graylog • Prometheus
  </text>

  <!-- Neon Capsule 2 -->
  <rect x="420" y="155" rx="20" ry="20"
        width="300" height="36"
        fill="none"
        stroke="url(#neonStroke)"
        stroke-width="2"
        filter="url(#glow)" />

  <text x="440" y="178"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="13"
        fill="#bde9ff">
    Detection → Correlation → RCA → Trend
  </text>

</svg>
